services:
  testapp:
    image: testapp
    build:
      context: ./
    restart: unless-stopped
    container_name: testapp
    ports:
      - 8082:8080
    networks:
      - laravel
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

  mysql:
    image: mysql:8.0
    container_name: mysql-laravel
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root@123
      MYSQL_DATABASE: testapp
      MYSQL_USER: testuser
      MYSQL_PASSWORD: StrongPassword123!
    ports:
      - "3307:3306"
    volumes:
      - laravel_data:/var/lib/mysql
    networks:
      - laravel

volumes:
  laravel_data:

networks:
  laravel:
    external: true
